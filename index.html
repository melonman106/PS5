<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Google Drive</title>
<link rel="icon" href="https://raw.githubusercontent.com/melonman106/PS5/refs/heads/main/img/google-drive.png">
<link rel="icon" href="./img/google-drive.png" type="image/png">
<style>

:root{
--ps-blue:#0072ce;
}

/* page */

body,html{
margin:0;
padding:0;
font-family:Segoe UI,sans-serif;
color:white;
height:100%;
overflow:hidden;
background-size:cover;
background-position:center;
transition:background-image .6s ease;
}

.vignette{
position:fixed;
inset:0;
background:linear-gradient(to bottom,transparent,rgba(0,0,0,.9));
z-index:-1;
}

/* startup */

#startup-overlay{
position:fixed;
inset:0;
z-index:9999;
background:black;
}

#startup-overlay video{
width:100%;
height:100%;
object-fit:cover;
}

/* nav */

.top-nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.tabs span{
margin-right:25px;
opacity:.5;
cursor:pointer;
}

.tabs span.active{
opacity:1;
border-bottom:2px solid white;
}

.system-icons{
display:flex;
gap:20px;
}

/* views */

.view{
display:none;
padding:0 40px;
}

.view.active{
display:block;
}

.icon-row{
display:flex;
gap:20px;
overflow-x:auto;
padding-bottom:20px;
}

.icon-row::-webkit-scrollbar{
display:none;
}

/* tiles */

.item-icon{
width:120px;
height:120px;
border-radius:12px;
border:3px solid white;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.05);
transform:scale(.9);
transition:transform .25s ease,box-shadow .25s ease,filter .25s ease;
filter:brightness(.8);
}

.item-icon img{
width:90%;
height:90%;
border-radius:8px;
object-fit:cover;
}

.item-icon.active{
transform:scale(.9975);
box-shadow:0 10px 30px rgba(0,0,0,.7);
filter:brightness(1.1);
}

/* branding */

.branding{
position:absolute;
bottom:30px;
left:40px;
}

.logo-text{
font-size:2.4rem;
margin:0;
}

.tagline{
opacity:.8;
}

.action-btn{
background:var(--ps-blue);
border:none;
padding:10px 45px;
border-radius:30px;
color:white;
font-weight:bold;
cursor:pointer;
}

.action-btn:hover{
background:white;
color:black;
}

/* iframe */

iframe.game-iframe{
display:none;
position:fixed;
inset:0;
width:100vw;
height:100vh;
border:none;
z-index:10000;
background:black;
}

</style>
</head>

<body>

<div class="vignette"></div>

<div id="startup-overlay">
<video id="startup-video" src="playstation-startup.mp4" autoplay muted></video>
</div>

<div class="top-nav">

<div class="tabs">
<span id="t-home" class="active">Games</span>
<span id="t-movies">Media</span>
<span id="t-store">Store</span>
</div>

<div class="system-icons">
<div id="clock"></div>
</div>

</div>

<div id="v-home" class="view active">
<div class="icon-row" id="row-home"></div>
</div>

<div class="branding" id="branding">
<h1 class="logo-text" id="display-title">WELCOME</h1>
<p class="tagline" id="display-tag">Select a game</p>
<button class="action-btn" id="action-btn">Play</button>
</div>

<iframe class="game-iframe" id="game-frame"></iframe>

<script>

/* DATABASE */

const gameDatabase={
hk:{name:"Hollow Knight",tag:"Voidheart Edition",icon:"img/hk.png",bg:"img/hk2.png",file:"hk.html"},
as:{name:"Astro's Playroom",tag:"Adventure",icon:"img/as.png",bg:"img/as3.png",file:"as.html"},
cp:{name:"Cuphead",tag:"Studio MDHR",icon:"img/cp.png",bg:"cp2.png",file:"cp.html"},
mc:{name:"Minecraft",tag:"Sandbox",icon:"img/mc.png",bg:"img/mc3.png",file:"mc.html"},
un:{name:"Undertale",tag:"Sandbox",icon:"img/un.png",bg:"img/un3.png",file:"undertale.html"},
tr:{name:"Terraria",tag:"Sandbox",icon:"img/tr.png",bg:"img/tr3.png",file:"terraria.html"},
sm:{name:"Super Mario 64",tag:"Sandbox",icon:"img/sm64.png",bg:"img/sm643.png",file:"sm64.html"},
yt:{name:"Youtube",tag:"Entertainment",icon:"img/yt.png",bg:"img/yt3.png",file:"yt.html"},
doom:{name:"Doom",tag:"Rage Software",icon:"img/doom.png",bg:"img/doom3.png",file:"doom.html"},
fnaf:{name:"Five Nights at Freddys",tag:"Entertainment",icon:"img/fnaf.png",bg:"img/fnaf3.png",file:"fnaf.html"},
ovo:{name:"OvO",tag:"Entertainment",icon:"img/ovo.png",bg:"img/ovo3.png",file:"ovo.html"},
dm:{name:"Drive Mad",tag:"Entertainment",icon:"img/dm2.png",bg:"img/ovo3.png",file:"dm.html"},
crossy:{name:"Crossy Roads",tag:"Entertainment",icon:"img/crossy.png",bg:"img/crossy3.png",file:"crossy.html"}
};

/* STATE */

let selectedIdx=0;
let inGame=false;

const branding=document.getElementById("branding");
const actionBtn=document.getElementById("action-btn");
const gameFrame=document.getElementById("game-frame");

/* UPDATE UI */

function update(){

if(inGame) return;

let keys=Object.keys(gameDatabase);
let row=document.getElementById("row-home");

row.innerHTML="";

keys.forEach((key,i)=>{

let g=gameDatabase[key];

const div=document.createElement("div");
div.className="item-icon"+(i===selectedIdx?" active":"");
div.innerHTML=`<img src="${g.icon}">`;

div.onclick=()=>{
selectedIdx=i;
update();
};

row.appendChild(div);

if(i===selectedIdx){

document.body.style.backgroundImage=`url('${g.bg}')`;

setTimeout(()=>{
div.scrollIntoView({behavior:"smooth",inline:"center"});
},10);

}

});

let current=gameDatabase[keys[selectedIdx]];

document.getElementById("display-title").innerText=current.name;
document.getElementById("display-tag").innerText=current.tag;

}

/* PLAY */

function playSelected(){

let keys=Object.keys(gameDatabase);
let game=gameDatabase[keys[selectedIdx]];

inGame=true;

gameFrame.src=game.file;
gameFrame.style.display="block";

branding.style.display="none";
document.querySelector(".top-nav").style.display="none";

}

actionBtn.onclick=playSelected;

/* EXIT GAME */

function exitGame(){

inGame=false;

gameFrame.src="";
gameFrame.style.display="none";

branding.style.display="block";
document.querySelector(".top-nav").style.display="flex";

update();

}

/* KEYBOARD */

document.addEventListener("keydown",e=>{

let keys=Object.keys(gameDatabase);

if(e.key==="Escape" && inGame){
exitGame();
return;
}

if(inGame) return;

if(e.key==="ArrowRight"){
selectedIdx=(selectedIdx+1)%keys.length;
update();
}

if(e.key==="ArrowLeft"){
selectedIdx=(selectedIdx-1+keys.length)%keys.length;
update();
}

if(e.key==="Enter"){
playSelected();
}

});

/* GAMEPAD */

let lastInput=0;

function gamepadLoop(){

const gp=navigator.getGamepads()[0];

if(gp){

let now=Date.now();

if(now-lastInput>200){

if(gp.axes[0]>0.6){
selectedIdx=(selectedIdx+1)%Object.keys(gameDatabase).length;
update();
lastInput=now;
}

if(gp.axes[0]<-0.6){
selectedIdx=(selectedIdx-1+Object.keys(gameDatabase).length)%Object.keys(gameDatabase).length;
update();
lastInput=now;
}

if(gp.buttons[0].pressed){
playSelected();
lastInput=now;
}

if(gp.buttons[1].pressed && inGame){
exitGame();
lastInput=now;
}

}

}

requestAnimationFrame(gamepadLoop);

}

gamepadLoop();

/* CLOCK */

setInterval(()=>{
let now=new Date();
document.getElementById("clock").innerText=
now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");
},1000);

/* STARTUP VIDEO */

const startupOverlay=document.getElementById("startup-overlay");
const startupVideo=document.getElementById("startup-video");

startupVideo.play().catch(()=>{});

startupVideo.addEventListener("ended",()=>{
startupOverlay.style.display="none";
});

setTimeout(()=>{
startupOverlay.style.display="none";
},7000);

/* INIT */

update();

</script>

</body>
</html>
